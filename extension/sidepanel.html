<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ScreenHelp</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0a0a0b; color: #e7e7ea; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
      #status { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; padding: 24px; text-align: center; }
      #status h1 { font-size: 16px; margin: 0; }
      #status p { font-size: 13px; color: #8b8b93; margin: 0; line-height: 1.5; }
      #status code { background: #1a1a1d; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
      #status button { background: #7c5cff; color: white; border: 0; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
      #app { display: none; width: 100%; height: 100%; border: 0; }
      .row { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #5a5a62; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
      .dot.ok { background: #10b981; }
    </style>
  </head>
  <body>
    <div id="status">
      <h1>ScreenHelp</h1>
      <p>Connecting to the local app at <code id="url">http://localhost:3000</code>…</p>
      <div class="row"><span class="dot" id="dot"></span><span id="state">Checking…</span></div>
      <button id="retry">Retry</button>
      <p style="font-size: 11px; color: #5a5a62;">
        Start the web app with <code>pnpm dev</code> in the project folder, then click Retry.
      </p>
    </div>
    <iframe id="app" allow="camera; microphone; display-capture; clipboard-read; clipboard-write" referrerpolicy="no-referrer"></iframe>
    <script src="sidepanel.js"></script>
  </body>
</html>
